<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ㄱㅂㅅ - 미래를 설계하는 기술</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <style>
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 1.2s ease-out forwards; }
        .brand-logo { background-color: #2563eb; clip-path: polygon(0 0, 90% 0, 100% 50%, 90% 100%, 0 100%); padding: 0.5rem 1.5rem; display: inline-block; font-weight: bold; color: white; }
    </style>
</head>
<body class="bg-slate-950 text-white">

    <nav class="fixed w-full z-50 px-8 py-6 flex items-center justify-between backdrop-blur-md bg-black/50 border-b border-white/10">
        <div class="brand-logo text-lg">ㄱㅂㅅ</div>
        <div class="flex space-x-8 text-sm uppercase tracking-widest font-medium">
            <button onclick="openModal('aboutModal')" class="hover:text-blue-400 transition-colors">기업소개</button>
            <button onclick="openModal('orgModal')" class="hover:text-blue-400 transition-colors">조직도</button>
        </div>
    </nav>

    <main class="min-h-screen flex items-center justify-center" style="background: linear-gradient(rgba(0,0,0,0.7), rgba(0,0,0,0.7)), url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2000'); background-size: cover;">
        <h1 class="text-5xl md:text-8xl font-bold text-center animate-fade-in">미래를 설계하는<br>ㄱㅂㅅ의 기술</h1>
    </main>

    <!-- 모달 컨테이너들 -->
    <div id="aboutModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-xl">
        <div class="bg-white rounded-2xl w-full max-w-4xl h-[80vh] flex flex-col overflow-hidden">
            <iframe src="1-1.html" class="w-full flex-grow border-none"></iframe>
        </div>
    </div>

    <div id="orgModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-xl">
        <div class="bg-white rounded-2xl w-full max-w-4xl h-[80vh] flex flex-col overflow-hidden">
            <iframe src="1-2.html" class="w-full flex-grow border-none"></iframe>
        </div>
    </div>

    <script>
        function openModal(id) { document.getElementById(id).classList.remove('hidden'); }
        // 자식 iframe에서 호출할 함수
        window.closeAllModals = function() { 
            document.querySelectorAll('[id$="Modal"]').forEach(m => m.classList.add('hidden')); 
        }
    </script>
</body>
</html>
