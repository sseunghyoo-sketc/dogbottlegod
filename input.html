<!DOCTYPE html>
<html lang="ko" class="scroll-smooth">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ㄱㅂㅅ - 미래를 설계하는 기술</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;700&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Inter', sans-serif; }
        @keyframes fadeIn { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
        .animate-fade-in { animation: fadeIn 1.2s ease-out forwards; }
        
        .brand-logo {
            background-color: #2563eb;
            clip-path: polygon(0 0, 90% 0, 100% 50%, 90% 100%, 0 100%);
            padding: 0.5rem 1.5rem;
            display: inline-block;
            font-weight: bold;
            color: white;
        }
        .custom-scrollbar::-webkit-scrollbar { width: 6px; }
        .custom-scrollbar::-webkit-scrollbar-track { background: transparent; }
        .custom-scrollbar::-webkit-scrollbar-thumb { background: #374151; border-radius: 10px; }
        
        /* 조직도용 추가 스타일 */
        .line-v { width: 1px; height: 30px; background-color: #cbd5e1; }
        .card { transition: all 0.2s ease; background: white; border: 1px solid #e2e8f0; }
    </style>
</head>
<body class="bg-slate-950 text-white selection:bg-blue-600 selection:text-white">

    <nav class="fixed w-full z-50 px-8 py-6 flex items-center justify-between backdrop-blur-md bg-black/50 border-b border-white/10">
        <div class="brand-logo text-lg tracking-tight">ㄱㅂㅅ</div>
        <div class="hidden md:flex space-x-8 text-sm uppercase tracking-widest font-medium">
            <button onclick="openModal('aboutModal')" class="hover:text-blue-400 transition-colors">기업소개</button>
            <button onclick="openModal('orgModal')" class="hover:text-blue-400 transition-colors">조직도</button>
            <a href="https://padlet.com/sseunghyoo/padlet-wtjoxg8xtxohz0s4" target="_blank" rel="noopener noreferrer" class="hover:text-blue-400 transition-colors">채용공고</a>
        </div>
    </nav>

    <!-- 메인 생략 (동일) -->
    <main class="min-h-screen flex items-center justify-center relative overflow-hidden" 
          style="background-image: url('https://images.unsplash.com/photo-1451187580459-43490279c0fa?q=80&w=2000&auto=format&fit=crop'); background-size: cover; background-position: center;">
        <div class="absolute inset-0 bg-slate-950/70"></div>
        <div class="text-center z-10 animate-fade-in px-4">
            <h1 class="text-5xl md:text-8xl font-bold mb-6 drop-shadow-lg">미래를 설계하는<br>ㄱㅂㅅ의 기술</h1>
            <p class="text-xl md:text-2xl text-blue-200 drop-shadow-md">Next Generation Innovation & Technology</p>
        </div>
    </main>

    <!-- 모달 영역: 내부 내용을 소스 1, 2에서 가져옴 -->
    <div id="aboutModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-xl">
        <div class="bg-gray-50 text-gray-800 border border-white/10 rounded-2xl p-8 max-w-4xl w-full max-h-[80vh] overflow-y-auto custom-scrollbar">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold">기업소개</h2>
                <button onclick="closeAllModals()" class="text-4xl text-gray-500 hover:text-red-500 transition-colors">&times;</button>
            </div>
            <!--[cite: 2]의 내용을 삽입 -->
            <div class="prose max-w-none">
                <h1 class="text-4xl font-bold mb-6">(주)ㄱㅂㅅ</h1>
                <p class="text-xl italic mb-10">"완벽한 사람은 없지만, 함께라면 누구나 더 큰 가치를 만들어낼 수 있습니다."</p>
                <!-- 상세내용 생략 가능하지만 1-2 내용을 여기에 넣으시면 됩니다 -->
                <p>... 기업소개 상세 내용 ...</p>
            </div>
        </div>
    </div>

    <div id="orgModal" class="hidden fixed inset-0 z-[100] flex items-center justify-center p-4 bg-black/80 backdrop-blur-xl">
        <div class="bg-gray-50 text-gray-800 border border-white/10 rounded-2xl p-8 max-w-4xl w-full max-h-[90vh] overflow-y-auto custom-scrollbar">
            <div class="flex justify-between items-center mb-8">
                <h2 class="text-3xl font-bold text-slate-900">조직도</h2>
                <button onclick="closeAllModals()" class="text-4xl text-gray-500 hover:text-red-500 transition-colors">&times;</button>
            </div>
            <!--[cite: 1]의 내용을 삽입 -->
            <div class="scale-90 origin-top">
                <div class="flex flex-col items-center">
                    <div class="card p-6 rounded-xl w-64 text-center shadow-sm">
                        <div class="text-xs font-bold text-indigo-600 uppercase tracking-widest mb-1">CEO</div>
                        <div class="text-xl font-bold text-slate-900">김창환</div>
                    </div>
                    <div class="line-v"></div>
                </div>
                <!-- 나머지 조직도 내용 추가 -->
            </div>
        </div>
    </div>

    <script>
        function openModal(id) {
            closeAllModals();
            document.getElementById(id).classList.remove('hidden');
        }
        function closeAllModals() {
            document.querySelectorAll('[id$="Modal"]').forEach(modal => {
                modal.classList.add('hidden');
            });
        }
    </script>
</body>
</html>
